id: cat-directconnect-without
description: |
  Paired with cat-directconnect-with. Catalog entry for Direct Connect removed.
  Same prompt + same band. If the agent saves within band on
  manifest+lint alone, the catalog entry is redundant; if it falls
  outside the band, the entry earns its place.
prompt: |
  Add AWS Direct Connect to my estimate in us-east-1.
catalog_mutations:
  - op: removeEntry
    service: awsDirectConnect
expectations:
  - predicate: save_succeeded
  - predicate: estimate_renders_cost
    min_monthly_usd: 109.5
    max_monthly_usd: 328.5
  - predicate: max_tool_calls
    n: 15
