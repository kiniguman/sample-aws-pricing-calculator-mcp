id: llm-cognito-cold-call
prompt: |
  Build an AWS Pricing Calculator estimate for Amazon Cognito with
  50,000 monthly active users for an authentication-heavy mobile app.
  Use us-east-1. Return the shareable URL.
description: |
  The canonical agent-behavior test. Cognito is a multi-tier
  service (Lite, Essentials, Plus) with a curated catalog entry.
  The catalog block in get_service_fields tells the agent which
  tier to use and which fields are required. Production
  observations show that agents often skip discovery and guess for
  unfamiliar services. This scenario tests whether Haiku, given a
  clean prompt, calls get_service_fields before add_service for an
  unknown service.
expectations:
  - predicate: save_succeeded
  - predicate: no_tool_errors
  # Discovery-before-action: the agent must consult get_service_fields
  # (which carries the catalog block for curated services) before
  # committing to a save. Either build_estimate or add_service counts
  # as the save action — agents may choose either.
  - predicate: trajectory_includes
    sequence: [get_service_fields]
    strict: false
  - predicate: max_tool_calls
    n: 8
  # The closing-the-loop assertion: catalog content reaching the
  # agent context produces a save that renders priced in the
  # browser. 50K MAU on Essentials should be ≥ $50/mo; the agent's
  # exact MAU choice may vary, so we only require that *some* cost
  # rendered (floor of $1/mo distinguishes priced from free-tier-
  # only-zero).
  - predicate: estimate_renders_cost
    min_monthly_usd: 1.0
