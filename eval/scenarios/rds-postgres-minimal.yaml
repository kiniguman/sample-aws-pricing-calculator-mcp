id: rds-postgres-minimal
description: |
  Amazon RDS for PostgreSQL at the catalog's verified minimalConfig
  (Single-AZ db.r6g.large + 100 GB gp3). Encodes the
  columnFormIPM-wrapped-shape lesson from 2026-05-30 catalog batch 2.

  The previous catalog entry shipped dotted-path keys
  ('columnFormIPM[0].Instance Type') in minimalConfig — those are
  silently dropped by the pricing engine. Saves succeed, lint
  passes editable, but the rehydrated estimate renders $0. The
  correct shape is { columnFormIPM: { value: [{ ... wrapped row
  ... }] } } where each cell is itself a { value: ... } object,
  including the special 'undefined' utilization slot whose inner
  value is { unit: '<percent>', selectedId: '%Utilized/Month' }.

  At db.r6g.large + 100 GB gp3 + Single-AZ this prices ~$175/mo.
calls:
  - tool: create_estimate
    args:
      name: eval-rds-postgres-minimal
  - tool: add_service
    args:
      estimate_id: ${estimate_id}
      services: |
        [{"service":"amazonRDSPostgreSQLDB","group":"Database","config":{
          "region":"us-east-1",
          "description":"Single-AZ db.r6g.large with gp3 storage",
          "columnFormIPM":{"value":[{
            "Number of Nodes":{"value":"1"},
            "Instance Type":{"value":"db.r6g.large"},
            "Deployment Option":{"value":"Single-AZ"},
            "TermType":{"value":"OnDemand"},
            "undefined":{"value":{"unit":"100","selectedId":"%Utilized/Month"}}
          }]},
          "storageVolume":"General Purpose-GP3",
          "storageAmount":{"value":"100","unit":"gb|NA"}
        }}]
  - tool: validate_estimate
    args:
      estimate_id: ${estimate_id}
  - tool: export_estimate
    args:
      estimate_id: ${estimate_id}
expectations:
  - predicate: save_succeeded
  - predicate: no_tool_errors
  - predicate: lint_verdict
    expected: editable
  - predicate: trajectory_includes
    sequence: [create_estimate, add_service, validate_estimate, export_estimate]
    strict: true
  # Single-AZ db.r6g.large + 100 GB gp3 prices ~$175/mo. Floor of
  # $50 catches the columnFormIPM-wrong-shape regression class
  # (where the row's content gets dropped and only the storage
  # base price renders).
  - predicate: estimate_renders_cost
    min_monthly_usd: 50.0
