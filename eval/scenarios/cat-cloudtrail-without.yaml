id: cat-cloudtrail-without
description: |
  Paired with cat-cloudtrail-with. Catalog entry for CloudTrail removed.
  Same prompt + same band. If the agent saves within band on
  manifest+lint alone, the catalog entry is redundant; if it falls
  outside the band, the entry earns its place.
prompt: |
  Add AWS CloudTrail to my estimate in us-east-1.
catalog_mutations:
  - op: removeEntry
    service: awsCloudTrail
expectations:
  - predicate: save_succeeded
  - predicate: estimate_renders_cost
    min_monthly_usd: 5
    max_monthly_usd: 15
  - predicate: max_tool_calls
    n: 15
