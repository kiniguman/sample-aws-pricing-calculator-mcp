id: probe-stepfunctions-deleted-specific
prompt: |
  Add AWS Step Functions Standard workflows to my estimate.
  1 million executions per month, 8 state transitions per
  execution, us-east-1. Return the URL.
description: |
  FALSIFIER — tests H1 ("specific prompts → catalog adds little")
  against the unit-choice bug class.

  Step Functions has the millionPerMonth-vs-perMonth trap
  (commit 745923c). Without the catalog, the agent has only the
  manifest's options[] for the `numberOfExecutions` frequency
  field — which lists perHour/perDay/perMonth (and NOT
  millionPerMonth — that's a Lambda-side unit).

  Specific prompt with full magnitudes. If H1 holds, the agent
  reads manifest options[], sees only perHour/perDay/perMonth,
  picks perMonth → ships \$199.90 estimate.

  If the agent picks a unit not in options[] (like millionPerMonth
  from training prior on Lambda), the save renders \$0.
catalog_mutations:
  - op: removeEntry
    service: awsStepFunctions
expectations:
  - predicate: trajectory_includes
    sequence: [get_service_fields]
    strict: false
  - predicate: max_tool_calls
    n: 20
