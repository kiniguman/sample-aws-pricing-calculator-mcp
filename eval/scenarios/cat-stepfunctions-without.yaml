id: cat-stepfunctions-without
description: |
  Paired with cat-stepfunctions-with. Catalog entry for Step Functions removed.
  Same prompt + same band. If the agent saves within band on
  manifest+lint alone, the catalog entry is redundant; if it falls
  outside the band, the entry earns its place.
prompt: |
  Add AWS Step Functions Standard Workflows to my estimate in us-east-1.
catalog_mutations:
  - op: removeEntry
    service: awsStepFunctions
expectations:
  - predicate: save_succeeded
  - predicate: estimate_renders_cost
    min_monthly_usd: 99.95
    max_monthly_usd: 299.85
  - predicate: max_tool_calls
    n: 15
