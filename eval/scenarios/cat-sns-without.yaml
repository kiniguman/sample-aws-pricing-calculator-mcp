id: cat-sns-without
description: |
  Paired with cat-sns-with. Catalog entry for SNS removed.
  Same prompt + same band. If the agent saves within band on
  manifest+lint alone, the catalog entry is redundant; if it falls
  outside the band, the entry earns its place.
prompt: |
  Add Amazon SNS to my estimate in us-east-1.
catalog_mutations:
  - op: removeEntry
    service: amazonSimpleNotificationService
expectations:
  - predicate: save_succeeded
  - predicate: estimate_renders_cost
    min_monthly_usd: 0.75
    max_monthly_usd: 2.25
  - predicate: max_tool_calls
    n: 15
